<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Quire Minimal</title>
</head>
<body>

<h2>Quire Test</h2>

<p id="status">Loading...</p>

<input id="input" placeholder="Type message..." disabled>
<button id="send" disabled>Send</button>

<p><strong>Response:</strong> <span id="output"></span></p>

<!-- Load your GitHub RAW quire.js -->
<script type="module" src="https://cdn.jsdelivr.net/gh/CodingAxolotl/QuireDT@main/quire.js"></script>

<script type="module">
  const status = document.getElementById("status");
  const input = document.getElementById("input");
  const button = document.getElementById("send");
  const output = document.getElementById("output");

  async function start() {
    await quire.init();
    status.textContent = "Quire is online.";
    input.disabled = false;
    button.disabled = false;
  }

  button.onclick = async () => {
    const text = input.value.trim();
    if (!text) return;

    const reply = await quire.ask(text);
    output.textContent = reply;
  };

  start();
</script>

</body>
</html>
