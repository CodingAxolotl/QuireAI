<!DOCTYPE html>
<html>
<head>
  <title>Mini AI v1</title>
</head>
<body>

<h2>Mini AI</h2>

<input type="text" id="userInput" placeholder="Type something..." />
<button onclick="send()">Send</button>

<p><strong>Bot:</strong> <span id="output">Loading...</span></p>

<script type="module">
import { pipeline } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2";

let embedder;
let dataset = [];
let datasetEmbeddings = [];

const output = document.getElementById("output");

async function init() {
  output.textContent = "Loading model...";

  // Load embedding model
  embedder = await pipeline(
    "feature-extraction",
    "Xenova/all-MiniLM-L6-v2"
  );

  output.textContent = "Fetching dataset...";

  // 🔁 PUT YOUR RAW GITHUB LINK HERE
  const response = await fetch("https://raw.githubusercontent.com/CodingAxolotl/MyAI/refs/heads/main/dataset.json");
  dataset = await response.json();

  output.textContent = "Embedding dataset...";

  // Compute embeddings for dataset inputs
  for (let item of dataset) {
    const result = await embedder(item.input, { pooling: "mean", normalize: true });
    datasetEmbeddings.push(result.data);
  }

  output.textContent = "Ready!";
}

function cosineSimilarity(a, b) {
  let dot = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
  }
  return dot;
}

window.send = async function () {
  const input = document.getElementById("userInput").value;

  const result = await embedder(input, { pooling: "mean", normalize: true });
  const inputEmbedding = result.data;

  let bestScore = -Infinity;
  let bestIndex = 0;

  for (let i = 0; i < datasetEmbeddings.length; i++) {
    const score = cosineSimilarity(inputEmbedding, datasetEmbeddings[i]);
    if (score > bestScore) {
      bestScore = score;
      bestIndex = i;
    }
  }

  output.textContent = dataset[bestIndex].response;
};

init();
</script>

</body>
</html>
