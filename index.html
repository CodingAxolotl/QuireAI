<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Quire</title>

  <!-- Load CSS from jsDelivr -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/CodingAxolotl/quireDT@main/style.css">

  <!-- Load Quire library -->
  <script type="module"
          src="https://cdn.jsdelivr.net/gh/CodingAxolotl/QuireDT@main/quire.js"></script>
</head>
<body>

<div class="app">

  <div class="topbar">
    <div class="brand">
      <div class="logo">Q</div>
      <div class="brand-text">
        <div class="title">Quire</div>
        <div class="subtitle">by Creeper Labs</div>
      </div>
    </div>
    <div id="status" class="status">Initializing...</div>
  </div>

  <div class="chat-wrapper">
    <div id="chat-box" class="chat-box"></div>

    <div class="input-area">
      <input id="input" placeholder="Message Quire..." disabled>
      <button id="send" disabled>Send</button>
    </div>
  </div>

</div>

<script type="module">

  const status = document.getElementById("status");
  const input = document.getElementById("input");
  const button = document.getElementById("send");
  const chat = document.getElementById("chat-box");

  async function start() {
    await quire.init();
    status.textContent = "Online";
    input.disabled = false;
    button.disabled = false;
  }

  button.onclick = async () => {
    const text = input.value.trim();
    if (!text) return;

    addMessage("user", text);
    input.value = "";

    const reply = await quire.ask(text);
    addMessage("bot", reply);
  };

  function addMessage(type, text) {
    const div = document.createElement("div");
    div.className = "message " + type;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  start();

</script>

</body>
</html>
