<!DOCTYPE html>
<html>
<head>
  <title>Quire Mini AI</title>
</head>
<body>

<h2>Quire Mini AI</h2>

<input type="text" id="userInput" placeholder="Type something..." />
<button onclick="send()">Send</button>

<p><strong>Quire:</strong> <span id="output">Loading...</span></p>

<script type="module">
import { pipeline } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2";

let embedder;
let dataset = [];
let datasetEmbeddings = [];
const output = document.getElementById("output");

async function init() {
  output.textContent = "Loading model...";

  // Load embedding model
  embedder = await pipeline(
    "feature-extraction",
    "Xenova/all-MiniLM-L6-v2"
  );

  output.textContent = "Fetching dataset...";

  // 🔁 Replace with your GitHub raw dataset link
  const response = await fetch("https://raw.githubusercontent.com/CodingAxolotl/MyAI/refs/heads/main/dataset.json");
  dataset = await response.json();

  output.textContent = "Embedding dataset...";

  // Compute embeddings for dataset inputs
  for (let item of dataset) {
    const result = await embedder(item.input, { pooling: "mean", normalize: true });
    datasetEmbeddings.push(result.data);
  }

  output.textContent = "Ready!";
}

function cosineSimilarity(a, b) {
  let dot = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
  }
  return dot;
}

window.send = async function () {
  const userText = document.getElementById("userInput").value;

  const result = await embedder(userText, { pooling: "mean", normalize: true });
  const inputEmbedding = result.data;

  // Step 1: find the highest similarity score
  let bestScore = -Infinity;
  for (let i = 0; i < datasetEmbeddings.length; i++) {
    const score = cosineSimilarity(inputEmbedding, datasetEmbeddings[i]);
    if (score > bestScore) bestScore = score;
  }

  // Step 2: collect all dataset entries that are "close enough" (top match)
  const threshold = bestScore - 0.0001; // tiny margin to include ties
  const topMatches = [];
  for (let i = 0; i < datasetEmbeddings.length; i++) {
    const score = cosineSimilarity(inputEmbedding, datasetEmbeddings[i]);
    if (score >= threshold) {
      topMatches.push(dataset[i].response);
    }
  }

  // Step 3: pick random response among top matches
  const randomResponse = topMatches[Math.floor(Math.random() * topMatches.length)];
  output.textContent = randomResponse;
};

init();
</script>

</body>
</html>
