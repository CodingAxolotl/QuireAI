<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Quire - Creeper Labs</title>

  <!-- External CSS (optional, works without it) -->
  <link rel="stylesheet" href="https://raw.githubusercontent.com/CodingAxolotl/quireDT/refs/heads/main/style.css">
</head>
<body>

  <!-- Creeper Labs Branding -->
  <div class="brand">Creeper Labs</div>

  <!-- Main Chat Container -->
  <div class="chat-container">

    <div id="status" class="status">Initializing Quire...</div>

    <div id="chat-box" class="chat-box"></div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Message Quire..." disabled />
      <button id="sendBtn" onclick="send()" disabled>Send</button>
    </div>

  </div>

<script type="module">
import { pipeline } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2";

let embedder;
let dataset = [];
let datasetEmbeddings = [];
const statusEl = document.getElementById("status");
const chatBox = document.getElementById("chat-box");
const input = document.getElementById("userInput");
const button = document.getElementById("sendBtn");

async function init() {
  statusEl.textContent = "Loading brain...";
  embedder = await pipeline("feature-extraction", "Xenova/all-MiniLM-L6-v2");

  statusEl.textContent = "Loading knowledge...";
  const response = await fetch("https://raw.githubusercontent.com/CodingAxolotl/QuireDT/refs/heads/main/dataset.json");
  dataset = await response.json();

  statusEl.textContent = "Training neural connections...";
  for (let item of dataset) {
    const result = await embedder(item.input, { pooling: "mean", normalize: true });
    datasetEmbeddings.push(result.data);
  }

  statusEl.textContent = "Quire is online.";
  input.disabled = false;
  button.disabled = false;
}

function cosineSimilarity(a, b) {
  let dot = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
  }
  return dot;
}

window.send = async function () {
  const userText = input.value.trim();
  if (!userText) return;

  appendMessage("user", userText);
  input.value = "";

  const result = await embedder(userText, { pooling: "mean", normalize: true });
  const inputEmbedding = result.data;

  let bestScore = -Infinity;
  for (let i = 0; i < datasetEmbeddings.length; i++) {
    const score = cosineSimilarity(inputEmbedding, datasetEmbeddings[i]);
    if (score > bestScore) bestScore = score;
  }

  const threshold = bestScore - 0.02;
  const topMatches = [];

  for (let i = 0; i < datasetEmbeddings.length; i++) {
    const score = cosineSimilarity(inputEmbedding, datasetEmbeddings[i]);
    if (score >= threshold) {
      topMatches.push(dataset[i].response);
    }
  }

  const reply = topMatches[Math.floor(Math.random() * topMatches.length)];
  appendMessage("bot", reply);
};

function appendMessage(sender, text) {
  const msg = document.createElement("div");
  msg.className = "message " + sender;
  msg.textContent = text;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}

init();
</script>

</body>
</html>
